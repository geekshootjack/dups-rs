name: Build Binaries

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            binary: dups.exe
            archive: dups_windows_x64

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: dups
            archive: dups_macos_x64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: dups
            archive: dups_macos_arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: dups
            archive: dups_linux_x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGING="${{ matrix.archive }}_${{ steps.version.outputs.tag }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $STAGING = "${{ matrix.archive }}_${{ steps.version.outputs.tag }}"
          New-Item -ItemType Directory -Path $STAGING
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$STAGING/"
          Compress-Archive -Path "$STAGING/*" -DestinationPath "$STAGING.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}_${{ steps.version.outputs.tag }}.tar.gz
            ${{ matrix.archive }}_${{ steps.version.outputs.tag }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.archive }}_${{ steps.version.outputs.tag }}.tar.gz
            ${{ matrix.archive }}_${{ steps.version.outputs.tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
